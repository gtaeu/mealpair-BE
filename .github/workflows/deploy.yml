name: MealPair CI/CD (Java 25 & Boot 4.0.5)

on:
  push:
    branches: [ main, preview ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mealpair:${{ github.ref_name }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/mealpair:${{ github.ref_name }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to Oracle Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd /home/mealpairdev
            
            # .env 파일 생성 및 갱신
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
            echo "DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/mealpair:${{ github.ref_name }}" >> .env
            
            # 브랜치별 컨테이너 선택 실행
            if [ "${{ github.ref_name }}" = "main" ]; then
              docker compose pull app-prod db-prod
              docker compose up -d app-prod db-prod
            else
              docker compose pull app-preview db-preview
              docker compose up -d app-preview db-preview
            fi
            
            # 안 쓰는 이미지 정리
            docker image prune -f
